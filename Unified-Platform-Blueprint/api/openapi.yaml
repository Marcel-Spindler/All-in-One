openapi: 3.0.3
info:
  title: Unified Ops Platform API
  version: 1.0.0
  description: Initiale API fuer zentrale Run-Orchestrierung der vier Tools.
servers:
  - url: http://localhost:3020
paths:
  /api/v1/health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /api/v1/runs/start:
    post:
      summary: Startet einen neuen Run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunStartRequest'
      responses:
        '201':
          description: Run angelegt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
  /api/v1/runs/{runId}:
    get:
      summary: Liefert Run-Details
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Run gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
    patch:
      summary: Aktualisiert Run-Status/Metriken
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunUpdateRequest'
      responses:
        '200':
          description: Run aktualisiert
  /api/v1/runs:
    get:
      summary: Listet Runs
      parameters:
        - in: query
          name: tool
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Liste
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RunResponse'
  /api/v1/runs/{runId}/artifact:
    post:
      summary: Registriert ein Output-Artefakt zu einem Run
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactRequest'
      responses:
        '200':
          description: Artefakt registriert

components:
  schemas:
    RunStartRequest:
      type: object
      required: [tool, startedAt]
      properties:
        tool:
          type: string
          enum: [incident-tool, pdl-fast, waagen-performance, ps-copilot]
        startedAt:
          type: string
          format: date-time
        inputFiles:
          type: array
          items:
            type: string
    RunUpdateRequest:
      type: object
      properties:
        status:
          type: string
          enum: [started, success, warning, failed]
        finishedAt:
          type: string
          format: date-time
        metrics:
          type: object
          additionalProperties: true
        warnings:
          type: array
          items:
            type: string
        errors:
          type: array
          items:
            type: string
    ArtifactRequest:
      type: object
      required: [type, path]
      properties:
        type:
          type: string
          example: tracking_csv
        path:
          type: string
        contentType:
          type: string
          example: text/csv
        sizeBytes:
          type: integer
    RunResponse:
      type: object
      properties:
        runId:
          type: string
        tool:
          type: string
        status:
          type: string
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        inputFiles:
          type: array
          items:
            type: string
        outputFiles:
          type: array
          items:
            type: string
        metrics:
          type: object
          additionalProperties: true
        warnings:
          type: array
          items:
            type: string
        errors:
          type: array
          items:
            type: string
